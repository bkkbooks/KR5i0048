body:
  text: 五經合編目録呂帝心經先天一氣度人妙經延生證聖真經金玉寶經醒心真經重刋道藏輯要五經合編孚佑上帝純陽呂祖天師著心經呂帝曰天生萬物惟人最靈匪人能靈實心是靈心為主宰一身之君役使百骸區處羣情物無其物形無其形稟受於天良知良能氣拘欲蔽日失其真此心既失此身亦傾欲善其身先治其心治心如何即心治心以老老心治不孝心以長長心治不悌心以委致心治不忠心以誠恪心治不信心以恭敬心治無禮心以循理心治無義心以淸介心治無廉心以自愛心治無恥心以積德心治為惡心以利濟心治殘賊心以匡扶心治傾陷心以仁慈心治暴戾心以謙遜心治傲慢心以損抑心治盈滿心以儉約心治驕奢心以勤愼心治怠忽心以坦夷心治危險心以忠厚心治刻薄心以和平心治忿恚心以寬洪心治褊窄心以傷身心治沈湎心以妻女心治姦淫心以果報心治謀奪心以禍患心治鬬狠心以正教心治異端心以至信心治大疑心以悠久心治無恆心以始終心治反覆心以施與心治慳吝心以自然心治勉強心以安分心治非望心以順受心治怨尤心以推誠心治猜忌心以鎮定心治搖惑心以中正心治偏袒心以大體心治細務心嗟乎人心不治不純如彼亂絲不理不淸如彼古鏡不磨不明如彼劣馬不勒不馴我故説經欲治人心人心得治天地淸寧偈曰一切惟心心最危範天圍地發光輝天心即在人心見人合天心天弗違妙哉妙哉此經實講治心工夫不著一道家常談其論治心處統之則為三十六分之則為七十二三十六天數也七十二地數也通篇計句一百單八句是統三十六七十二之數合天地之道也計字四百四十四純陽數也天道也合三十六七十二一百單八四百四十四則成六百六十純陰數也地道也見得人心治則天地交天地交則上下泰而四時行萬物育矣於此足徵內相燮理之才焉九天開化司祿文昌題先天一氣度人妙經淸心法言危微寸衷萬魔畢攻顚倒憧擾昧卻虛中本無一物亦豈空空收其放心以敬為宗乾乾惕惕咫尺天宮潔身法言生而為人道德之身齋戒沐浴亦許自新毋荒於寢毋醉於醇收束肢體祗謁明神跛踦不作規矩長親淨口法言舌神正倫通命養神穢言出口穢物八唇喪爾之命昏爾之神何如捫舌嚼此菜根齒牙氷雪獲侍天庭肅壇法言藐爾星壇感格萬神供必如儀几拂沙塵掃除汚穢蕩滌塵氛嚴整衣冠班列齊聲洗心朝拜上帝監臨焚香法言一介凡夫聊以表誠假此心香上達蒼冥祥煙縹眇瑞氣氤氲凝結成蓋覆護羣生積功纍行一舉飛升秉燭法言屋漏沉幽曖昧何休幽幽冥冥似夜魂遊焚此蘭膏如點雙眸霞光滿室日月交流藉是光明萬聖停留心地朗朗即此是求啓經法言展誦是經惕惕虔心經自帝敕義出天文抱守精氣統歸於神存無守有便得長生誹謗正教霹𩆝雷霆帝君曰豫儒人也素不諳玄宗偶於市中酒肆幸遇正陽帝君示以玄機黃梁一覺遂透玄關因是棄官修道遍訪本師苦行備嘗得脫殼尸解證真妙行真人立願度人成無上道屢蒙上帝簡擢次第加升自慚學淺亦愧才疏今庚申八月中秋夕玉皇上帝坐金闕光明座上詔會九霄大聖十極真人同諸三界金仙五嶽神祗講宣先天一氣無上妙法時有東嶽聖帝出班長跪奏玉帝曰昔承龍詔命考察人間十惡重罪量業加罪今臣以不孝不弟不忠不信姦盜邪淫者或殱其嗣或使其夭或加諸惡病或令其顚倒其有一方習染大約相似者或水火或旱潦種種警戒彼終怙惡不悛伏願慈悲憫此愚蒙加以法外之仁則蒼生感德洪恩普遍庶不至下民塗炭汨沒其靈性未審宏光得加法外之仁否於時玉帝慈顔憫喻靈關廓開普告大衆曰此等衆生所以不孝於親不友於弟不忠於君不信於友不別於夫婦至於姦盜邪淫靡所不為者皆由喪此元精失此元氣以致元神不守舍放縱無明任性施為須示本原來路使復其元神則林林總總者自得各返其天不致沉於汚濁爰命豫下界於一陽來復候降示乩頭闡宣正教豫奉命惟謹敬闡聖意宣示先天一氣經典願爾等衆生其敬守之元氣源流為第一節人生母腹中一股元氣團結而成借母之呼吸以通天氣並無雜氣往來逮夫一離母腹先天打破後天之氣遂踵而從事目耗於邪色耳耗於淫聲舌耗於美味心耗於利欲於是真元之氣耗散靡遺將縱其貪心肆其邪念而混元之氣蕩然汨盡故往往精神強足遽至夭喪者氣先耗耳亞聖云無暴其氣又云氣體之充也能充此氣即可以為聖可以為賢可以成真可以得道一理而已夫元氣之充豈惟人為然哉天得此氣而常淸地得此氣而常寧五獄得此氣而常存四海得此氣而常振綿綿千古渺渺萬年皆此元氣之周流而無間可以人而喪此元氣乎每見幼稚之子知識未開於父母則知愛於兄長則知敬見可哀而悲見可喜而歡雖曰天良用事亦元氣未散而能然人苟能兢兢守之保而勿失將世無惡俗人無夭喪天地淸寧雨暘時若何患人不為善有是有非守身者此為第一關要栽培元氣為第二節夫先天之氣聚之則明散之則昏培之者使之常聚而不散也自離母腹一點真氣落於丹田遂名祖氣祖氣乃玄關之緊要即元氣之凝聚也苟不培之日散而日亡矣是以古昔真人命人調息所以養此元氣使聚而不散也然調息須調真息息若徒行呼吸之氣不能使真元之氣聚而歸踵亦屬枉然先師云毋意毋必亞聖云勿忘勿助乃是玄關真諦所以調息一端不必數息不必依息盤膝靜坐靜氣凝神閉目垂簾下視丹田使元氣聚而不散使鼻息來往進多出少則漸而純熟此氣自然團結於中漸而升漸而降充滿一身無刻走漏矣功夫須無間斷人身一小天地天氣之流行不爽毫末人身亦然於某時氣行至明日其時一周是謂小周天故培元氣者宜於子午時行功至交陰分氣斂而不舒故當日日整密加功若或作或輟功不整密縱得玄關祕鑰無益也善行功者先靜其地次靜其身次靜其心然後此氣行動周身無往無來若存若亡綿綿密密混混淪淪尋之而不可見去之而不能舍此中妙用略得少許從此加功無難上達淸靜經云遣其欲而心自靜澄其心而神自淸旨哉斯言其進道之門徑也願衆生其共勉之坎離交姤為第三節乾位乎南陽火也坤位乎北陰水也此先天定位自先天退位而後天從事於是而以坎離代之坎中一畫本乾也而落於陰位離中二畫本坤也而落於陽位非反覆之何以復此先天本位復此先天本位須取坎填離其取之之法非心腎一交之謂也用功仍在取氣能使此氣上升泥丸則不交而自交升之之法只四字而已提舐吸閉先垂簾閉目何謂垂簾若不閉則神易散若全閉則入於陰道於是用垂簾閉法既坐靜後乃吸一種淸氣使之內接乎先元其吸之之後不可使內元溢出乃得漸歸丹田由是以舌舐上腭使津液盈滿下灌丹田如此數次自然丹田微熱元氣運動至此則用提法提者下提谷道也貫想此氣行至谷道乃挺身一提使此氣由尾閭達三關上泥丸如頭紅面熱一般然後徐徐下天堂降唇中由重樓而至綘宮則引火下降丹田而一身暢美難言矣如此日日一周則由勉而安由安而化丹田元氣自充塞無間純熟後氣上升則火自下降水火既濟則坎宮之真陽與離宮之真陰有不混合乎此謂取坎填離徑法涵養沐浴為第四節元氣未全則抽添功力不可一日間斷若既已充足則必思所以養之此時之養無從著力須從一片靜默中得之無矜情無躁氣無嗔恚無寒冷刻刻靜坐使吾身之內常有太和氣象春光明媚天無浮雲地無霾障一種淸光遍於身體漸養漸醇漸醇漸靈久之則靜坐時有一團白光從天根現出如月之光輾轉不散此綘宮中真氣發露也又久之則靜坐時有一團紅光從天根現出轉輾不散此靈谷中真氣發露上升到此地位須愈加涵養身如枯木心若死灰無一點意念透起至此時則升降自然周而復始無一息之停乃天地之真元聚而不散時也從此則天根發現復有一團金光透露虛空轉輾不散聚露既久徐徐收歸內府再養再放此乃沐浴工夫也到此時候即龍虎俱降候也然猶不可自恃一念稍弛則此光又散所謂存無守有若亡若存者正此候耳上下關頭一過則無處非功行矣惟此際最難進道者其倍加涵養乎朝元胎就為第五節夫氣既凝於靈谷則上下交而五行之生尅自全故木金相配之後而刀圭遂合矣刀圭不合則戊土與已土終未混合故升降之際又須巽風吹動鎔鑄而使其自合五行之氣各得其全則混合而無間矣於是而團結者始聚於一處而上朝矣聚之久漸成聖胎如嬰兒之在腹隨氣而運是又當有以保之此時凡有一切外事悉屏棄無遺一如木石使坐靜間無一息之凝滯則胎漸可成就然功夫到此愈加縝密稍有阻滯仍流散於俄頃則此混元又將走脫故當如太空之中無一點雲蔽則水中之珠自光吐萬丈至此又不可使之透露須又加回光返照功夫刻刻回光時時返照而又不容著力養之既久則聖胎成而可以出現矣其出現時隨一片金光上升目中所見不可畏懼亟斂金光使之復歸原處如此日日現出日日收斂則漸而老成又別有境界矣爾衆生其無視此為易到亦無視此為難到則得矣神化無方為第六節自聖胎成後難言功矣欲見之而不可即欲聞之而不得聲身外尋身道中求道須身親其境不能以語言文字求也領悟無上無極則從此神遊宇內身化無方而飛升在即矣然尚須行滿三千六百之行若未能滿則亦常存世間耳所以立願度人最為要事誓願滿足遂看機緣夙緣深則明師之度我也速夙緣淺則明師之度我也遲然遲速有時而明師終不能舍我故凡人生在世須當自家庭孝弟始以及宗黨以及朋友以及州里更推而及於君王更推而及於萬物皆從此一點元氣流貫於中何患神仙之不可階而升也試看孝子忠臣何嘗自幼出家勤行修道而未嘗不在仙班則知丹學之功雖不可少而未始不自立身行已基之也爾衆生其敬而守之蓋聞丹學無宗淵源各別得其關鑰一理而已不得其傳則隨遇而各出一種語意至後人莫可趨嚮總之不得其端委耳即如丹經中名樣曰嬰兒曰姹女曰黃婆曰黃芽曰鉛曰汞種種名號皆後人隱其意而使人尋索也究而言之不過曰陰曰陽而陰陽總原於太極之無極一以貫之任千萬丹師不出此矣豫於此典明白指示不雜一字隱語蓋以答上帝矜憐之厚意而使此蚩蚩者得有自而入也玉帝已喜臣典之明了頒示諸曹爾等其尋味而玩索之當得混元保合不至為宇內之匪人云豫奉命謹撰延生證聖真經吕帝曰吾自多劫修持證真大羅此心不泯常憐世人混於浮華身多濁苦愚昧癡貪不知不覺沈淪欲海吾自遊行天下降示乩頭力行不倦變化千萬億身度脫敬信男女放大光明照臨塵世於太上老君前發廣大願願於世間衆生四生六道悉具道緣悉行道行我於爾時度彼悉成仙聖無諸輪𩌏受無量快樂老君允奏敕下隨行顯化於是復統天仙地仙雲仙水仙山仙神仙等衆飛巡善惡普度世間點化衆生勤行正道誓不退𩌏惟願上智衆生同圓種智開覺性靈章第一若復有人體太上好生之心修無上洞玄之道用功清靜抱守真元屏棄塵緣養其黍珠常與一二道友培植靈苗精研妙用開覺性靈斷除迷妄正巳之心照巳之性益已之靈體天地之運化得至妙之元神燦然光明豁然正覺風月往來自無拘束物我兩忘順逆俱化修大還丹而形神俱妙乃至餐霞吸露調鶴栽花出有八無變化莫測縱橫吟嘯之間悟徹虛無至道一塵不染萬境俱融是為清淨覺性之人於是重説偈言無知無覺先斯性而得命太上虛無甕翻成滄海田浪生浪死中顛倒還錯亂蒙蔽此性靈六欲為障礙搖蕩精氣神迷惑有無際耽幻而失真忘真而事幻至使陰與陽神昏與氣耗化之為鬼魂一靈總不淨而於愛欲中死灰復燃熾流轉似輪迥頭出頭沒苦聞我是經者將此因證悟實性真不泯種種正淸靜心與空化空空與心澄定順天適性情了法結元彀何常有死生不生亦不滅龜息鶴蹲時寂然而不動飛飛躍躍間是道成堅鞏如是修煉之人我當保舉崑臺書名金精定命黃庭日永凝曉露之金莖紫戶雲生灌朝霞之玉液仙神衛體玉女侍形圓滿功行位證上真正心行善章第二若復有人認破幻軀解脫煩惱於人加害之時作忍辱想除愁苦根證淸涼果自然智慧圓明性理融淨無所障礙得大利根如此之人堪載至道常憫世人此心不正富貴場中揮金如土聲華譽內爍玉為灰色欲窩邊撒珠如豆是非門內逞舌為鋒種種迷邪競勝樂利逢源利欲海中日潮月汐蛟龍魚鱉不知岸所無有出期深可哀憫若有上智衆生以道德為修身之本功過為考已之權積福存仁戒食物命國忠家孝克已敦倫惜字放生尊重三寶勿遷禍移殃邀名越分念念透露刻刻精明利欲海中減卻數分善事門中樂輸一股心有實心事作實事便得福報不淺是為正心行善於是重宣偈言杳渺空相間是相成真相一點至虛真萬物皆可證説天本非天得命是非命混沌玉胞中養成須彌界無道亦無覺先天成一氣芥子落泥中空洞原如是祖氣積空靈是因當契悟欲知生夀人養厚而成是欲知生貴人養淸而成是欲知生富人養重而成是欲知生哲人養靜而成是欲知生姦人養乖而成是欲知生惡人養戾而成是欲知生善人養德而成是欲知生貧人養貪而成是欲知生愚人養濁而成是欲知生夭人養薄而成是天地微與茫初未有是等色欲既已判而品已斫成如雪必化消如花必代謝身未離天根心未通元會惻隱是本真功名是緣合情欲既引芒如日隱雲內若能植真苗一毫而不昧惻隱復含章大羅仙近是如是修煉之人我當保舉南極書齡北辰紀善亭亭夀址摩翠岱於淸冥浩浩福源瀉銀河於碧漢便得十天善人擁護其身然後金液鍊形玉符召升守關修道章第三若復有人頂禮聖神尊重道經師寶是人夙世因緣甚為希有不可思議功德敬修之法在守關破染洗濯塵蒙未萌之前其關淸正隨境而動其關即搖偶非其道其關即失一切所欲因染而入元鏡蒙霾心月障礙遂至身罹網羅境強情弱難存易放亂法邪行敗倫逆理忘廉恥心致傷風化一失人身萬劫難遇以故去染之道濯空新見毋令潛深深則難滌用巨斧心削除根葉破染用誠存誠用守守之必堅存之必固然後借假修真因真固假三元五臘之期北斗南辰之會應開赤靈袐篆隨敷寶熖光明普令康寧咸沾道化體合自然用合一妙一妙之道無有是非如大碧落能含萬象萬象之中歸入微塵我有微塵我有六合知我所有須知所無無既不無一妙自見可以推倒煩惱城可以斷除邪妄惑可以證我淸淨身可以直渡生死海鑿破無明開現真相是為守關修道於是重説偈言三淸太上尊恆修萬世劫常滿世界願總心無二用秦王漢武時窮極求仙道仙道未能顯罪根深與固復有楚王英敬信沙門法卒以邊陲事利欲仍在故難入超度倫起惑人之謗是以狄仁傑巡撫江南時奏毁吳楚祠千七百所外吳潁經廣東毁祠殺蛇怪杖僧警愚俗法寶今猶在世有興與衰大道物不二不苦亦不樂本來無苦樂如如自在心無恐無防失心包法森羅日月星斗分風雨不能加雷電不能擾虎狼不能怖惡孽不能近豁達太虛空來之而不拒去亦不留痕中庸而淸靜勸人植靈苖時加雨露潤道君身不榮常如天花艷道君耳不樂常如天籟音道君眼不見常如日月明道君口不辨常如天地分道君心不昧常如水澄淸以此道君靈常奉常瞻仰如彼一蚊蟲不能度瀚海附此巨舟中安樂登彼岸如彼無根枝植此良園內長成棟宇材開花而結果近有貧乏人藉此為活計講説布施功偽造因與果何嘗種福田肥此不墾土將此至玄門加之汚穢語終不見福報與道原不預道君本無能化育神其道正大通覺心來往無塵障無樂亦無苦得真苖者是稽首三界尊日月星斗列億萬衆生中常超無際岸如是修煉之人吾當保舉東華集福北斗延生梨棗長新視履啓戶庭之福松筠益茂耆頤開夀域之春真人侍衛魔病驅除罪削黑酆名登緑籍戒殺放生章第四若復有人心能向善戒殺放生常作是想蒙其覆載頂其日月荷父母之生成叨神明之庇佑寒暑相調雨露相潤以五穀食我以三台護我方得延生活命是以仰體上天之心神明之念力轉慈悲福利不淺乃至濕胎卵化禽獸鱗蟲各體異形之物皆有好生惡死之念如此義解始覺萬物盡歸一體無始原係同靈何得混沌靈光入魔毒道殺彼肥此回顧罪增輪轉寃愆永無解釋報應之道或遠或近或顯或微或遲或速或分或合或拋離於父母或破損於五官或身首異處相償或虎咬蛇傷相報少年夫婦早分鸞鳳之臺聰俊子孫漸落餓莩之輩或瘟病蠱毒以纒綿或枷杻囚牢而鎖禁生男多夭生女多亡或求生不生求得不得或衣不遮體食不充腸癡啞呆聾癯㾃跛瞎種種罪報深可矜憫果有出世丈夫現身大士或濟涸鬆繩捐資釋命廣大仁慈普行善事是為戒殺放生之人於是重宣偈言大道發生機豫我元根相根相何所見在此空中界一片淸淨場此中原不染無此亦無彼先天為玄妙不苦亦不集含宏而廣大正覺不察明墮落三塗內須臾法輪轉不知復不覺人物禽獸間有知無知相自在一點靈交孚咸感應力轉太真心淨此惡業道無間無隔絶修身將心照心喜甘肥芻心欲口不受心照現光明元玄無塵垢腎喜金玉聲腎欲耳不受腎從此心回心回腎亦定肺喜啖馨香肺欲鼻不受肺輔此心間心淸肺自靜肝喜採艷豐肝欲目不受肝本佐於心心靜肝亦應脾喜上妙味脾欲舌不受脾亦助於心心照脾隨轉胃喜食濃鮮胃欲意不受胃從此心安心安胃亦往不為六欲魔淵冥現真慧盡性為我性乃見淸淨根盡天為我天乃明道理淵盡我為我我靈明死亦燃盡物為我物遠此恐怖網極大極細關皆臨深履薄天地有無常我道何常常天地有有夀我道何夀夀若使木灰燼枯稿而殆盡人生百歲時此身何所度欲老天地間無死必無老若必無老死以生求生道如是修煉之人我當保舉椿萱並茂瓜瓞丕綿九幽地下得超解脫之津八景宮中常享淸恬之樂諸大神員出入匡扶所求如意明彰報應章第五若復有人性根愚鈍不知報應種種不為究悟以致聲色荒迷性情濁混流漂欲海深為痛憫聞我是經當速警精神靜心參究絶除煩惱棄擲貪癡修悟至本至根太虛大道若有敬信男女一聞是經心心改過頂禮三寶尊重師友者即得聰慧潛孚神識通達之報濟貧敬老解結申𡨚者即得人欽人仰芳譽千秋之報憐才救病恤孤撫下者即得康健殊常夀綿福永之報矜愚掩惡施恩報恩者即得桂子蘭孫家尸戶祝之報立身修命養氣藏神者即得精力充固行滿飛升之報惜衣重黍周急賑飢者即得祿食豐饒安享自然之報如是行持飛仙巡奏令無子者得麟趾之祥有子者無夭尅之患父母團圓夫妻伉儷功名早遂於先鞭事業永流於後世是為明報之人於是重宣偈言本來有智慧如日而升天或為浮雲翳積著情與欲不知真苗田淸靈為閉塞但見美色時搖動於淫界金玉與寶花搖動於富界文章與黼黻搖動於貴界音樂與醇醪搖動於荒界不思淸淨身漸溺苦海內此海廣無邊無極無覺海衣食不能充如是苦楚海違逆典型謨如是刑罰海生離死別間如是愁慘海孤孑無依倚如是淒涼海劫殺謀害人如是罪犯海醫藥不能痊如是疾厄海富貴不隨心如是馳求海貪嗔過本來如是癡迷海金屋玉樓中如是荒淫海究竟苦海中寧甘身棄捨損壞此靈苗貪功貪名利功名利欲真靈苖微塵似微塵并不似修省無解脫戰墮三業中仍被業海債叛逆與爭攘勇猛英雄債楚館與秦樓嬌媚妖姿債乘風逐浪間商賈金銀債攻城掠地時將帥刀兵債如是苦海中種種難罄喻總溺於是心未照忠與孝堯舜與許由亦足證真道秦椎與漢節亦足證真道泣杖與鏤形亦足證真道張齒與顏舌亦足證真道孝順忠義流此靈永不昧漢武活其魚而得魚珠報隋侯活其蛇而得蛇珠報如彼楊寶雀乃能銜此環如彼董昭蟻乃能出其獄勿為桀紂刑而施文王澤種種善惡報反掌即成是能以大慈心智慧照朗朗植此福因多神鬼為欽畏如是修煉之人吾當保舉於三元三官座前令得三災永釋百福駢臻前程蒙福更增祿夀康寧運會沾恩得遂圖謀樂願千真垂庇萬聖護持方便權教章第六若復有人為塵事所羈不能斷除諸障淸靜性靈不能戒殺除暈廣行善事即於本分之中安其得失不騖傍求不生詭詐不濫殺生靈不謀淫别婦不侵尅人財不綺言兩語不呵叱他人不設謀定計於自修自責之外不苛求人過禽窠獸穴之所不加毒害顚沛之所不加言語刑罰之所不加𡨚枉敬信之所不加誹謗聖賢之所不加褻瀆是為平等丈夫亦得長生獲福子孫昌茂若不能廣行布施廣種福田即遇上等善人上等福事不可慳吝譬如塵世農夫種此美田一莖兩穗一穗兩歧成熟之時獲數倍利布施功德當自具慧眼不可思議又若有人不能持誦是經踐行善事即或書寫轉受為人解説是人所作功德獲福不少以上種種方便權教普化衆生吾自證真以來隨緣點化不違本願若有敬信男女在家樂善是為方便權教之人於是重説偈言愍此世間人而入諸魔道著此色相身色聲香味纍有香有味聲致我身著相譬如無我身何生香味纍色聲香味忘此意猶未盡意在猶復萌何為無色相空到諸法空意想皆除絶空空洞洞機乃至無意界如龍未蟄淵如海未翻瀚如雲未遇風如月在天半外物總無無內亦極無盡然似近昏晦無眼無意觀不知法法空事事皆朗照定慧何光明圓此為正覺天地何常貪山川不在祀神聖大慈心所供惟誠淨何必牲與犧而鑒人方寸總此方便門為下人宣説道豈盡此經無説見道根若以説為經言言皆虛謬無聞無見中此經原自在天生𢌿吾命天命𢌿吾性性本無矯揉命本無造作以安我本來以適我自來將此孝順心布施於親長將此撫恤心布施於卑幼將此忠信心布施於朋友將此敬愛心布施於昆弟將此節義心布施於夫婦將此惻隱心布施於奴婢將此好生心布施於物類耳目鼻舌言身意布施道此身包此心此心包天地以口問諸心以心發諸口從此晃朗天而行方便教真實而不虛是法平等等如是修煉之人吾當佑庇維祺懋介福祿是康現眷亡親各享淸恬之樂后昆來嗣丕綿爪瓞之宗愆尤永釋禍沴潛消顯道救人章第七若復有人夙世因緣受持靈寶獲大法力佩天師寶籙闡教濟民靈文寶號通三界以遵承雲篆天書舉萬神而諦聽便得正一功曹籙中官將飛雲捧奏仙官雷部監察元帥五帝直符六宫椽吏行止匡扶隨作隨應大則祈晴禱雨救水滅火驅雷役將斬𡾹誅邪次則起死回生行符治病方藥救人敷演道經講談祕密令得信解弟子轉轉流傳轉轉勸解轉轉受持轉轉濟度種種因緣雖云外功亦係道行內外兼修不可缺一若是之人在動則為乾在靜則為坤用功純久而忘乎其心為學無心為道必成是天地之至人人中之至真是為顯道救人之人於是重宣偈言金闕玉樓宮層層而密密斯即黃庭間戶戶皆明徹咫尺通神元風火為呼吸油油沛沛功莫知其順逆風輪海穴中豁達成祖氣元元大鍵開神母為歡豫三年産靈童龍虎為之懼别立此天壤雷霆為我馭靈明一綘宮玉輔金相是紅巾魔力神常侍之左右黃帝統五方六丁六甲守丹元暢靈光百年一九首元亨與利貞結成玉息種人能死即生能生即如死中滿而心安心安神自逸神逸天樂鳴樂鳴則帝靜帝靜而上遊諸神為之護法力本自然聲發而響應假使無日月此翁自明徹假使無星辰此翁自分別如彼滄海龍忽興雲與霧施雨遍天壤飛騰金闕內如彼山嶽虎嘯動風與雷霧隱變文章騰空靑冥上飯化而杖成乃見道法精坐甕與爛柯乃見道化神或為左慈杯或為丁令鶴或為果老驢或為王喬舄變化神莫知惟道光若是天地有始終我道無始終日月有明晦我道無明晦人事有變換我道無變換松柏有夀夭我道無夀夭豪傑有衰頺我道無衰頺美麗有銷鑠我道無銷鑠萬物有無常我道無無常鎮之若泰山澄之若海水量包六合外果了萬億劫瀚瀚浩浩間大濟此塵世如是修煉之人我當證明法事令其靈應保舉上淸自然執符把籙與道合真三世宗親悉皆解脫氷淸世外之風波雲淨壺中之日月超凌三界遊晏春臺圓滿證真章第八若復有人口誦此經心惟經語身行經行勤修上乘無諸懈怠此經功效是度世津梁修真徑路集福延生是經功德積子種孫是經功德保護眷屬是經功德離諸障礙是經功德無患難苦是經功德所求如意是經功德獲大淸淨是經功德得具六通是經功德出離生死是經功德超凌三界是經功德久久行持抱真守一動則和神靜則屏息以在世身作出世想修出世法逍遙雲表出有入無隱顯莫測闢陰陽於不夜開夀域於無疆妙契同仁道化無外惟願衆生內外堅持教化通達我於其間同諸天仙神仙真仙飛仙雲仙水仙山仙地仙等衆隨衆生機飛身化度或於塵市山林化度生死疾病化度風雷水火化度醫相星卜化度耕牧漁樵化度龍虎黿鼉化度舟航橋石化度重山疊水化度乃至夢中指點乩筆明言寶篆通靈神符演教種種變化度人誓必不違本願俾令四生六道悉皆覆庇無遺而度脫之爾等衆生至心皈命惟願道超太極之先法闡玄元之始是為圓滿證真於是重説偈言太華大溟中山龍水虎聚忽有琴瑟聲其音淸且鏗赤山碧水間瑤池虛靜素七七五行功合配陰陽道順逆水火精神龜玄窟住究之根與源順天成玉粒結搆此光芒一二三六變土金相伏藏木合成枝葉木中有火飛實水相滋植水木兩榮和火靈而神集飛躍還九九猿定神淸徹辟穀以存神源頭入我魄以魄養我魂玄酒助其息服氣本死心心死五官滅從此五藴空斬盡六門賊地戶列天羅煉虛返吾實綘宮有紫氣在道曰軒輊繫留黃庭中可超千萬劫如是修煉之人我為領袖保奏三淸自得玉篆披雲按陰陽而翔鶴鳳金書麗日頒帝旨以證仙真金光晃朗香靄氤氲天花散彩上升玉淸説是經已令諸世人流通讀誦依法行持過有重輕殫藉經文之袚濯罪無大小咸蒙仙聖之涵濡經通天界恩庇衆生是經在處有百千仙衆值日神員飛天神王金精猛獸隨所供養解厄消災延生集福經人合一人與經齊自然得瑤草琪花洞裏乾坤不老丹臺玉室天邊姓氏高懸永絶三途受無量福無負吾傳願同種智延生證聖經垂訓規則紫雲真人曰凡誦是經者切須淸淨嚴整衣冠誠心定氣叩齒演音然後朗誦愼勿輕慢交談接語務在端肅所謂太音聲希扣之則應信受之人每日淸晨焚香先誦淨心口身神咒次頂禮稱誦道祖寶號三遍至誠展誦真經或一卷三五卷皈依佩奉心慕身行自然所求如意所願隨心消災集福延夀證真矣有志者胡不勉而行之金玉寶經開經科範鐘鼓三鼕畢舉行溢三千數時丁四萬年丹臺開寶笈金口永流傳宣科伏以默而守柔而用靈光直射於太虛視無形聽無聲呼吸潛孚於帝座無誠不格有感必通恭炷真香虔誠供養太上無形無名無極大道無上元尊混元太極至微至道天尊默運天皇上帝虛無自然大羅三淸三境天尊玉皇赦罪大天尊玄穹高上帝勾陳上宮天皇上帝瑤天星主紫微大帝承天效法后土皇地祗九霄十極五老三垣諸天上帝二儀九曜五斗三台列宿星真堯舜禹湯文武厯代治世星君剎利釋迦護明大士過去未來見在天尊大成至聖文宣師正心誠意大天尊天地水府三官大帝賜福赦罪保命天尊北極法主四聖真人飛鸞教主輔元開化文昌司祿宏仁帝君張葛許薩四大真人九天天曹三天列聖飛鸞度世垂慈接教伏邪警世帝君玉露演法飛鸞洪願真君九天無上雷霆巡察三界糾報天尊三教護法三界伏魔大帝神威遠鎮天尊赤心忠良普察善惡火輪巡部大元帥剎遊太極傳宣聖化功曹天尊諸天羣真上聖十方萬靈真宰雷部律令執符風火神君年月日時四值功曹尊神樵沙待度五陵八百高真演化仙郎護法祇應尊神本境土地福德正神恭望洪慈俯垂淵聽以今琅函初啓寶笈將宣未敢擅專先伸奏啓演經誠意謹用敷宣宣意其諸情悃悉已披陳咸望垂光證盟持誦淸衆運誠舉揚法事舉安人各恭心志心皈依十方三寶當願衆生心開悟解受持看誦舉道場衆等人各運心誦經如法舉開經讚一稱一讚至無至奧至微玄太極沖和法法天丹月照爐光自白靈章祐世善隨緣希夷道合樵沙讖除蕩魔歸水火圓億劫迷根能了悟會看金玉大羅仙畢舉開函演奧天尊畢舉請誦金玉妙經開經偈無法法無無一法法無無法法原無法法漸歸無極法法通原在法無時開經咒洞玄靈寶貞教九符旋乾覆氣運化存珠太淸杳杳紫氣包吾至元無極靈秉河圖琅函光照普及虛無二儀九極三界十都慧光劍氣永及吾徒吾奉萬正紫極真人敕令除魔咒三五雷霆正一玄宗道為法本法滅魔情內魔既蕩外魔亡形靈根合一霽月會空天罡在戌祖氣羅胸默朝帝座靜悟無生至微至奧無盡無窮爽靈胎光幽精黃庭泥丸有電遍照洪濛一切魔魅永化塵風九陽運化永保離宮吾奉萬正紫極真人敕令淨壇咒唵喇唵喇唵喇唎正一雷霆敕令攝七遍除魔悟道萬源總一救苦歸真金玉寶經除魔章第一爾時玄玄應化功高普度億感大成萬正紫極真人垂慈接教伏邪警世帝君曰人之於身為魔之宮人之於心為魔之宗人之動靜為魔之令天之斡旋魔之四時地之派險魔之厯基一中乍始魔亦乃齊魔乎相耶相乎幻耶魔相幻無耶魔何欲我耶故聖人立其端而息其機天則以寧立其機而息其端天則以盈立基立端魔則易生魔之於道利我之鋒道之於魔亞彼之窮我其除之魔亦宜之內魔既易外魔乃降玄玄假寓六合孔彰魔乃道母道為魔逆期萬有之元元道魔己矣一陽二聚五火三金了無礙於當人而慧光灼灼知有為於蚌月而癸水融融起居坐臥外來之象經持顚倒內動之機不我而形何知著迹不形而我胡絶無塵昔掬并者而羞觸柱度關者而愧依羊道之迷之劫之所謂迷之以道不劫而歸道之以未發之明魔之以未明之發然之自然杳乎其相然之未然冥乎最上未然以然而然之無上太上好生之法玄黃無象之機機其一見乃殺其儀魔其有覺敢抗其機天殺機而星宿移地殺機而龍蛇離人殺機而天地頽天地之機而人以為故魔之境不離人機人苟無機而魔何歸持世上杳杳之至精而魔降矣盡無始之至相而魔亡矣魔之既亡道乃無疆馮萬物者不解未來俯一元者既酬已過侶其見聞而夕死之機在矣客其寂滅而無生之法盡矣至滅至窮道之以崇至窮至滅魔之為劫魔道日然而道魔何設檀園不落其曇而八極在表修道之教率性無為體付煙波不搖是化屠牛仞其廣額而登最上之空空欲轉靈丸是無尺界彌羅見相頓歸見相之緣太極消因始破消因之欲魔之有卻魔乃隨形不以其形魔何以故天之魔之地之魔之人之魔之三才魔之欲不以三才之魔而絶未魔之幻魔其在也天何以張天其在也地何以長地其在也人何以亡其魔之在有道之在無道以無無魔何在有蓋六氣而生九極之微八節而參十月之滿魔乎道也道乎魔也我無道基道無魔慮純純乎如氷炭之離炯炯乎於道魔之外降之未白正之以華白欲其明華何默默是守未判而關心是悟未合而以覺其道乃新而魔不犯也矣悟道章第二玄玄應化功高普度億感大成萬正紫極真人垂慈接教伏邪警世帝君曰穹穹者虛合之以體體成而虛歸道成而無已道之須臾不離是體其道也未有其道也欲究其道也道何以有也道生於萬物之前而在於萬物之本萬物於未道之中而化道之本末其道也宜其物也宜道物兩宜我何以宜不法不道謂之預教故太上以無名之名而道之以道道其御也徐道其合也離道之冥茫人之廢藏道之渺渺劫其多少故坎離奪天地之先日月發陰陽之大靈明二象遍乎四維瞻之以悠悠得之以朗朗懸之在前立於其垣把之以心暢之以神故其道也未有其道也以我之為用彼之道玄珠添癸水之潭離焰結靑蓮之蓋道其守也以融融而淸靜應之道其離也以遙遙而呼吸應之桔橰汲象外之源龍蛇舞混元之浪悟七十二候之遷移五十四相之覺照天一生水地六成之道之在乾而孤道之在坎而靜道之在我而忘體道之在彼而逍遙均一道也分以淵源混黑白之淪流並金木之氣息上則以淸下則以寧上則以明下則以靈貫萬法於不見之中而道有徑貫萬法於既見之始而道有性鼎雲繞劍空光撇不勝之根紫雪凝爐淨月了未萌之欲復有幻聞復有泰相復有歸來復有卜兆復有無無復有微奧低昻於四井之圍隱見於箕尾之外理若君臣親如父子生兮於不動之先應兮於開運之後剛柔順逆數之新也生老病死道之窮也一象六坤五行八節尋邪正於未剖之初邪正自剖覓汞鉛於有覺之中汞鉛自覺陰陽三返聖人泄一貫之微金玉九還佛老立億劫之行坤元恆順紀序健明循環六爻升沈四氣道之外也為贅疣道之比也為磐石鼓然化出人莫窮之眩然亞矣鼓然消長人莫留之聖人㘞矣天命在我地運依依究生殺於三才之顚而命運合矣佳兵不祥之氣聖人尚然用之况瑞麟祥符酬太上之生盜太極於一時百千萬億盜太極於億劫上下察之東南不喪西北興之天地不危聖賢合之彼此不離道德羅之神鬼不藏陰陽結之雲霞不聚日月明之恩怨不生情機遁之寒暑不變二氣由之道其在也鏡影不齊道其滅也神光空泛非道者何以知道之源非不道者何以不知道之源道其一也不以二為道其大也不以細為小大由之而道自彰道生道滅存乎莫忘欲明不道而道之理其機息矣其機息矣乃道之微如是之微道則己矣萬源章第三玄玄應化功高普度億感大成萬正紫極真人垂慈接教伏邪警世帝君曰萬源之源泒乎九野在在周之禹步為治源之在上㵼聖脈於淸源之在下湧靈流於坎源之在人運血氣於身源之在物按消長於時源之在道分教化於邪正源之在性轉河車於順逆源之在時定潮汐於子午源之在我控澄碧於陰陽源之在行潦而困源之在滄海而洋源之在井而愧源之在地而靜源之在未判而空源之在有象而酌源之在殺也而洪水泛亂源之在生也而潤澤濟湖源之在忠也而國脈和源之在孝也而家泒發源之在姦也而運用滯源之在忤也而溲汙凝源之在聖賢也而天地包源之在衆生也而嵗月淪其源之所泒不齊而源之原一也故太上有道德之源孔子有明德之源佛老有見性之源氣其合源源何以別源之淸而道生源之濁而道息其源之始也不知其源而源之末也不明乎源源之在癸為天一之津源之在亥為地六之法癸以離濟離以癸交離癸交濟萬源合氣悟彼萬源而巨航有力總一章第四玄玄應化功高普度億感大成萬正紫極真人垂慈接教伏邪警世帝君曰一以道元三曰物母物既道由三宜一主蒼蒼者一也冥冥者道也一不總之而萬類混矣一不分之而陰陽寡矣一不始之而道基頽矣故太上所謂得一萬事畢孔子所謂一以貫之釋迦所謂萬法歸一一之至理莫盡莫窮一之至奧何所不容天其覆也以愛地其載也以恩一中之中歸之見空一中之二歸之源宗一已不已而道乃隆一之化也而還虛一之繼也而復始驪龍抱一金珠現無上之光白虎含三紫雪長靈苖之蕊一其在也我欲存之一其滿也我欲散之一其化也我欲歸之一其正也我欲弻之一其道也我欲總之總之於道聖人得之聖人得總一之機而璇璣畢矣聖人得總一之旨而天地合矣總之以成化之以蒙總之以氣運之以沖道之所欲惟一是行抱元守一誠為良工懷萬源於一分九極於中人為一氣之先而人是悟人歸二氣之後而人是迷一之闔闢為易之門一之聚散成乾之體我其總之而一機乃祕我其一之而總一之機盡矣救苦章第五玄玄應化功高普度億感大成萬正紫極真人垂慈接教伏邪警世帝君曰太始之氣萬物一靈太始一脈布以衆生惜酉劫之迷癡因其自棄沈後果之欲愛墮以塵情慈航有普濟之緣頑石無浮波之日輪迥自轉萬苦相侵或水火刀兵盜賊或瘟疾刑法飢死種種罪孽何以解脫以故奏請彌羅飛鸞度化救苦劫之愚迷拔修功之善類婆心切切洪願歸來一切衆生惟依是鏡若有猛悟即便皈依逢甲子庚申朔望本命之期滌其塵襟蕩其彭祟朝太極於無極之中悟有我於無我之外默朝上帝靜合三淸懺前愆以自新悔後過而見覺如仙如佛忠孝為先希聖希賢善良是本結人鬼之緣遂樵沙之志一切惡趣苦難行持太上感應之篇盡悉消除更有一切男女在於苦厄之中洗心發願誦此經一千遍存想善神善事善境行住坐臥持唵呵喇叭口修唎吽吽真言心口運轉決絶塵思功至一月解疾病之苦功至二月解患難之苦功至百日解一切之苦功至千日解舉家之苦功至三千日解舉家一世之苦功至五千日解屢劫沈淪之苦功至萬日可入玄宗別有度脫若如是始終不頽遵依金玉之法按節修持或天仙地仙神仙人仙一切等等功夫自然了悟默會於心彌羅有詔超脫凡塵度世立功廣行救拔歸真章第六玄玄應化功高普度億感大成萬正紫極真人垂慈接教伏邪警世帝君曰真其歸乎假所以悟假其歸乎真自以出人生見聞渾然假寓認我之假真乃互互天亦人也地亦人也人亦人也惟人劫之假而假四時五行之運迷於百千萬億之假終何以歸故天地生形合人之度了其性命著落則歸而三才之真歸矣彌厯延延風收雲定真假混混性冷命休一切所為假關籠結至真之真頽已莫知分玄黃於靜覺知黑白於真空守元陽於神谷回水火於泥丸黃庭抱我之源赤子笑人之愛此皆真也天假浮雲地假消長人假老幼物假遷移此皆至假之假也引內之根分外之境神淸氣合精滿時宜位中而守二氣心中而護九陽任來任往厥然不動任收任放樂其無為三魂不散於竅七魄不凝於機太上合元始之形日月照未生之德綿綿八節默默四時天設道以還我地設法以還人人設運用以還物三才既設而當真之真散矣天無煙霞變幻之象而天自真地無江湖泛亂之畏而地自真人無死生小大之因而人自真物無三才消長之賴而物自真我無虛實存亡之慧而我自真我之真真能劈天地之假我之真真能改人物之假一切夢幻泡影之覺烏足有憐是真上至上之真始出至道之真真之歸性乃曰還元真之歸命乃曰還丹真之歸化乃曰還還真之歸假乃曰還見真之歸造而真乃全真之至至而真反頑真之不真其真自然歸乎歸乎真其明德始之真而真實終之真而真假故真之歸也而假以應之能以假裏之真覓無上之真一靈真矣無上至真之真在我之真是名真人真天真地之真盡歸於至真之人而真歸矣而真人備矣苟察天地之真天地之真原即我之真我之真真真之至矣金液章第七玄玄應化功高普度億感大成萬正紫極真人垂慈接教伏邪警世帝君曰金液者先天之道也即除魔悟道萬源總一之理而歸乎一身之真取陰陽未化之機而盜還元之氣盡此玄奧功夫而脫塵假以透玄關者乃離男坎女之至精而發生於至先之宮用活時而得之結白雲而凝於黃庭沖鵲橋而降須彌赤水玄珠靑漿玉露浮乎於八卦之中沈乎於九宮之下搖搖則渺轉轉則寧四體有中止之欲一元化上品之神花月西江醍醐東土木公佐上帝之權金母分太上之氣黃婆巡狩赤子嬉遊一曰淸靜以安居二曰調養以鎮物三曰傳天籟以明機四曰了地殺以忘智醉鄉一曲申子為終夢境三呼庚甲是始玄玄至頂生紫霧於杆頭妙妙至空化白雲於兔畔素練含光靑衣吐焰泥丸有八極之垣重樓有三天之闕鏗鏗鈴振灼灼花香法令至誠汞鉛潔淨一線之微而成不朽之丹半星之天而結無為之寶津液乃陰精血更濁欲明先天和合之靈即結後天分散之氣苟有邪機先元無措一中二中三上四下雄翼既展伏卵乃圓屯乃蒙生金由木並陳鼎中之苖吐物外之月忘言守志卻欲消身正本正天闡玄闡法龍從火出虎向水生八八之七七之養河圖有準銅漏無差凶中定至吉之爻幻裏得至尊之象粒粒定之節節分之烏肝兔髓為飱龍血虎精為食百日體乾十年聖化分君臣之治成淸靜之和六十四訣以抽添七百八宮之出入朝聞夕死得有失無晦朔除尸盈虧了性口眼鼻舌以憨憨手足經脈以息息靜雷伏隨巽風繞舍當此之時而蓮花挺矣紫霜成矣剛陽出矣先天璧矣道德是矣天仙證矣而金液滿矣萬源總一之真歸矣玉液章第八玄玄應化功高普度億感大成萬正紫極真人垂慈接教伏邪警世帝君曰玉液者後天捷法也乾生於未蒙坤生於有象至淸至靜築煉還虛嬰姹分張聖胎有覺瞻之忽忽察之杳杳爐溫神健劍利情柔靑帝當權黃龍在位少陽合靜法之微孤月照明星之末高犬彭作蕊汲露為漿三轉堪融七返乃會觀其變度察仲秋情枯木生苖老猿抱鏡宮商調大呂之音水火濟庚申之氣外剛內順外和內平典其火候積其銀根八萬四千之悟九百一十之還配者服之交者合之間者舞之暗者培之至杳至和至神至默聖人守舍公子登臺易付陰酬爻隨陽變佇景還虛停功了彼氤氲於長春之初閃灼於月明之後斯歸乎未歸斯成乎未成男精有過頂之渠女血有還胎之穴逢時守一守刻知三大布須彌小歸氣海踵之息之明之應之澄之以不波震之以未伏吞之健體服之延年中乘之道進步之宜欲盡上乘金玉必合一中之二三中之九周天甲子之循環大地陽春之廣布酌盡茲微長生必矣玄機泄度樵沙一切塵緣願普是悟誦經畢舉後金玉妙經性命真宗生天生地及生人金丹最上乘勇猛修行龍沙會裏人讚畢向來誦經功德上祈高真凝神合氣會悟玄宗同賴善功證無上道一切信禮伏以金聲玉振宣揚天語以云周口誦心持恍惚聖真而相接塵情消釋妙理昭明再炷真香虔誠上啓混元無極妙有高真三界十方諸天上聖垂慈接教伏邪警世帝君演化監經祇應無鞅聖衆仰祈洞鑒俯納丹誠今據某鄉貫奉道弟子某等諷誦仙經以今周竟竊慮心神散亂身體穢汚宣奏乖宜朝參失度字音舛謬句讀混淆故犯誤違千愆萬過非憑懺謝曷獲包荒端冀洪慈普垂原宥某等虔恭志心稱念消愆減罪天尊飛鸞度世天尊不可思議功德帝君聖誥志心皈命禮虛微玄奧靜化幽冥演無上之玄元消萬劫之罪果降魔度世立道超迷功高上洞之雷司德庇人天之世界大慈大化大願大尊隱顯萬方逍遙億國興天地之體共日月之照掌三十六極之仙銜管七百八界之神册立洪洪大志度億億凡生最高最上廣化廣仁玄玄應化功高普度億感大成萬正紫極真人垂慈接教伏邪警世帝君興行妙道天尊金玉經原跋粵自大道開天靈文垂世史傳柱下玄語五千吏隱漆園巵言十萬理極三元之奧文成八會之章瓊笈銀題太上之靈以泄丹書緑字重玄之祕攸彰借象筌真因文窺要無非念狂瀾之苦濟彼慈航憐永劫之迷普茲法雨洵生人之厚幸實上聖之𢎞仁乃者歧路既分流源愈遠五金八石徒勞丹竈殘煙三素九玄莫溯玉京初諦邈矣靑牛永去關前紫氣空浮嗟哉黃鵠不臨嶺上白雲誰贈泉掩英雄之夢塵埋綺繡之香薤露有悲松風無韻欲脫身於幻化須鋭志於真修茲紫極真人孚佑上帝憫至道之失傳救羣迷之胥溺飛鸞度世搦筆宜人受命彌羅天際遙來鶴駕傳經靈寶人間永煥龍文三教而統一元八編而綜萬派喝殘春夢空中散玄圃瓊花拂淨浮塵眼底看赤城霞氣粉碎百般窠臼雪消半點咿唔三誦而魔子魂銷久持而善人慶集還元閫奧出世津梁余也棲志蘧廬托身泡影未抱鄴侯之骨徒擁闕里之衣僕僕三十年何當回首炎炎方寸地儘自捫心暫隨飲啄人間終擬逍遙物外於戲蕩蕩斯世蚩蚩此氓同在五濁之中焉知來者欲出三途之難豈有他哉心死可以身生忘機乃能見性道無可道是在述者之明玄而又玄總歸作者之聖同人有志共證斯言弟子鏡源薰沐頓首跋後金玉經後跋余庚子秋自晉抵燕聞呂帝飛鸞度世心切慕之凡三謁方許皈依因有降經來壇之諭乃於臘月朔先一日薰沐叩壇旁舍肅候約亥初戞然響振聯擊者三則是臨壇降經時也方驚心駴目端拱靜聽數聞壇下擲管聲不移時而五千言立就響復如初而飄然去矣鳴呼異哉千載奇覯又命作後跋而余亦列其中故不量鄙陋敬紀以言曰憶昔麟符乘運玉書生闕里之光牛背傳經紫氣映函關之色風翻貝葉花撒九天日照尼珠光分四野名雖列為三教實則總乎一原厥後柱下塵生杏壇草鞠一棒之微莫悟三粳之妙不傳善類罔聞修途漸失貪心癡志渾如隨水之花態色淫聲一似沾泥之絮罪山岸積疇來華頂尋眠欲海波橫孰向桃溪問渡今者幸遇呂帝代天宣化憫世垂慈雲中繞黃鶴飛來天畔駕蒼龍至止淨壇響振搦管風生教統夫三杖結靑藜之燦經列為八輝籠銀海之花以太上感應之篇用昭心鑑惟忠孝善良是本爰作指車誠普度之慈航而中流之砥柱也念豫皇皇卉載碌碌無成悟卻電光石火之微傷茲蜉死蝣生之幻欲登覺岸須脫迷津露滴金盤萬斛塵灰濯盡簫聞瑤嶺一天雲霧吹開或剖大道之藩籬抑鏡玄門之寶筏為仙為佛希聖希賢上之可證玄宗次亦罔虧名教豫思勉矣衆共敬旃弟子亹源頓首敬跋醒心真經開經偈禍福無因惟人自取吉凶休咎惟天所與善惡之報不爽錙黍改過自新天曹奬許爾時無上仙師雲遊空中見有黑氣障蔽紅光潛消知天下之人為善者少作惡者多輪回六道旋轉四生未有窮盡而若輩作惡之人不知不覺冥頑不靈晨鐘報曉遂起欲心暮夜不休無非私意私欲不絶惡端日起不忠於君不孝於親不敬於師不信於友私其妻子傷其手足慢其尊長薄其親戚同室操戈負恩反噬殘忍殺命昏劣蔑理倚勢凌弱結黨暴寡造計害人唆訟漁利縱役縱僕殃民肆虐機械變詐作為不法欺謀孤嫠侮弄老稚取不義之財淫非巳之色奪人之産坑人之資擠人之危困人之窮壞人之名敗人之功阻人之善抑人之才傾人爵位損人財物破人姻親間人骨肉搆人爭鬬誣人過失談人閨閫辱人婦女謗人伎術截人生路發人陰事負人重托背約違誓翻雲覆雨誘人為非助人作惡好人所惡惡人所好言不忠信行不端正曲直違心毁譽隨意訕謗聖賢褻瀆神明仇敵正人狎昵匪類身居下流甘為汙賤玷辱祖先貽憂父母行險徼幸苟免無恥貪得無厭知過不改怙終遂非聞諫加怒耽樂賭博迷戀花柳好勇鬬狠酗酒詈罵聚談穢褻妄興劇戲耗難得財作無益事不惜物力不重五穀殘毁經書𢱍棄字紙居不學業動不循禮知德不酬忘本不憶敗廢祖産暴露亡柩臨喪不愼致祭不誠制中生子亡忌舉樂居室不和教子不嚴待下不恕撫幼不慈治家無法貽謀不善嫁娶不時致生淫佚分撥不均致生爭鬬奢儉違宜事失體制當為不為營求分外見富妄圖見貴艷慕失足不悟濡首不止飾貌盜名違道干譽喪已徇人矯情絶物觀理不淸聽言不察知人不明交友不擇接待不恭出語不謹處分不當當局不愼小忿不懲遠患不慮立志不高居心不一古訓不遵師傳不習省過不勤檢身不力負慚大廷獨欺暗室種種過惡不可枚舉又見縉紳大夫則患得患失逢迎固寵賄賂公行治安莫講不憂國事不念民瘼損下益上酷刑濫罰聚斂有才聽訟無術見利不興見害不革好爵是縻實曠厥職文人學士則荒廢經傳奔競功名矜才炫能誇已忌人又或造作淫書蠱惑士女揑成野史淆亂是非流害無窮作孽莫大庸夫俗子則胸無點墨目不識丁輒冠儒冠服儒服徒思蠅營狗苟不知返本窮源稍得寸進面貌昻然蔑視小民傲睨先輩遇單寒則掉頭不顧見顯達則搖尾乞憐刻剝窮人錙銖必較守財慳吝見義不為不度才不量力強不知以為知假不能以為能附會斯文胡謅滿紙見人著作妄肆譏評區區斗筲言之可恥少年子弟則製美而衣擇腴而食悠忽終年嬉遊竟日不知稼穡艱難不念寸陰堪惜老大無成傷嗟何及農工商賈則漲五穀以入市雜贋物以取利貴物賤買低貨高賣價不隨值錢不即給稱戥斗尺不公不平出輕入重出小入大欺謾愚稚凌壓孱弱造作不固效力不勤暗設魘魅浪費工料損人損物天之所怒藝術九流則學業未精便思行世輕視死生妄談禍福小則傷人財誤人事大則隕人命絶人祀豈惟人怨且有天刑吏胥隸役則婪贓作弊舞文弄法增減事情出入人罪縱姦陷善罔上行私錢糧恣其侵漁詞訟任其起滅炙詐編氓凌辱士子此等之人永墮地獄仙佛不度厮養奴僕則食人之食不思忠人之事居人之宅不知感人之恩當面趨承背後訕笑明中效力暗裏侵財心不安於貧家禮每失於孱主既已委身奉事又復蓄念他圖犬馬不如神人共憤婦人女子則性本陰柔見多偏隘每為乾餱啓釁常因長舌興殃非無禮於舅姑即失和於妯娌非苛虐其子婦即妒嫉其媵妾傾女君以邀寵凌夫子而自專骨肉成仇親姻不睦罔知四德寧曉三從至有帷薄不修淫奔可醜既玷本宗又辱夫族決江河之水難洗其羞回日月之光不照其穢更有身為牙媪口習誑言誤人婚姻將拙配巧誘人子女掠良為賤喜為引線之針最壞名閨之節一淪地獄永失人身僧尼道士則不解經典不守戒律淫欲未絶葷酒莫除借端化財實圖餔啜勸人禮懺徒為金錢方便不聞慈悲安在建醮則天神絶響作會則男女混雜何曾見性明心未見葆精煉氣勞逾白屋濁倍紅塵孽豈易消罪應加等是諸人等所作過惡習與性成毫不自悔所以黑氣凝結聚而不散昏昏然如霧障天逐逐然如魔附物自古及今茫茫苦海無時得度而若輩漠然安之羣然趨之陷溺日深可為隕涕若夫為善之家百不得一或資生無産不能自振或同志無人不知自奮或阻於時勢廢焉不前或抑於流俗喪其所守或勉強為善而志實不堅或中心向善而力有不足或一時從善不能淑其終身或一已好善不能化其眷屬或始念甚誠中道改轍或力行不怠偶爾蕩心或功夫未到妄想非分或造詣將深忽求效驗如是為善即為人惡根苖所以善氣上達方起即伏無上仙師雖復憐憫無可奈何可勝浩歎今爾等若欲消除黑氣大放紅光須聽偈言香火何時滅滅了又重然人於大海中百千億萬年生老病死苦終身被牽纒因緣念上起念上起因緣夢覺即無夢泡影亦虛懸電光石火中埋沒許英賢那見杰出者不是活神仙偈畢願爾等大衆生生世世在在處處永不起貪得心瞋怨心殺傷陷害心忤逆凌犯心姦淫偷竊心占奪爭鬬心欺蔑侮弄心姦詐誆騙心嫉妒毁謗心諂媚趨附心驕矜傲慢心慳吝苟簡心奢靡逸樂心妄想分外心求謀鑽剌心眷戀富貴心憂愁貧賤心計較得喪心分別爾我心炫耀名譽心遮蓋過失心瞞昧自欺心膠執自是心疑惑猶豫心懊悔改變心畏難退縮心安逸自在心苟且小就心責效旦夕心如是等心各各猛省務使方寸之中空空洞洞一物不交一私不受如皓月當空萬境澄徹如明鏡照人鬚眉畢現更如慧劍在身可以水斷蛟龍陸剸犀象斯為夢醒不在大夢又常起怖懼心慙愧心歡喜心決斷心勇猛精進心堅固耐久心凡此等心須以大智慧照之大精神赴之大力量任之斯能無微不燭無堅不破無難不成身混塵俗志氣淸明與天地合其撰與鬼神合其德何有於仙何有於凡何凡之非仙何仙之非天道化一理天人一家黑氣消滅紅光燭天是謂大醒永不入夢夫其有黑氣紅光者何以故人之有身如天地之有五行五行別為五色五色之中紅為暢滿黑為滯塞人之心一於惡則胸中壅塞不能流通故生黑氣一於善則仰不愧天俯不怍人胸懷浩蕩暢美快足故生紅光夫人之良心未盡滅絶雖在姦惡言及善事亦必面從其面從者由其善根未泯其終為不善者由其習惡既久心靈蔽塞不知為善之樂不知為不善之害謂天地鬼神於我無見於我無聞夫天地鬼神豈真無見豈真無聞人自不見人自不聞昏昏冥冥恣其所為詎知天地鬼神默伺微窺洞若觀火善不可掩惡不可藏殃慶殊途報應如響自古及今未之或爽易曰積善之家必有餘慶積不善之家必有餘殃所謂積者或以月計或以歲計或以世計蓋非一朝一夕之故其所由來者漸也積其善可以一世可以十世可以百世可以千萬世可以無有盡世積其惡輕或可以二世重則不能一世吾觀普天之下有積德礪行半生轗軻時至事起一朝榮顯者又有簞瓢樂道終身窮餓百年之後究與蘭蕙齊芳日月爭光者又有盡瘁事國殺身成仁名既留於身後福亦降於子孫報或顯於來世祿必享於天曹者又有富貴之家偶行不義福消孽積罰及後人者又有衣冠之子未聞大道身多疵病受纍無窮者又有蚩蚩之輩不知三尺敢作非為輒罹法網者又有凶暴之徒橫行無忌罪惡貫盈身家破壞者是非天道不齊皆由其家積善積不善自所召致不足疑怪蓋天道人事默相符合不爽毫髮亘古如斯於今為烈智者知而信之則可以寡過可以致祥愚者不信則禍不旋踵人苟欲除殃積慶務須遵守吾教大醒自心勿許一念遊移勿許一時間斷久久自然黑氣全消紅光繚繞不獨一身榮昌子孫亦獲吉慶不獨一家康泰一里盡得消殃但吾教玄玄玄之又玄識得玄玄神仙有傳不識玄玄徒事談玄謂之瀆仙罪亦彌天謹守吾法愼毋略焉愚蒙比比願爾先覺更以覺世功亦齊仙面是背非報應必顯尚其勉旃大衆寂靜諦聽偈言道德無終亦無始善則福臻惡禍至若能滌慮并洗心從前作孽皆堪恕我今大開方便門願引愚蒙同入道勿謂不覺與不知天曹日日關心竅呂帝親示奉行規條果報一凡讀是經者務於每日淸晨盥潄焚香洗心滌慮志誠朗誦此經一遍然後料理諸事不得束置高閣一持誦之後務須潛心玩味身體力行每夜省察一日所為有何罪惡久久行之自然功多過少慶集殃消不得口誦身違虛應故事一是經為救人度世之經有能刻板流傳者自身榮昌子孫吉慶有能刷印廣施者救諸苦厄凡事如心有能奉行不倦有功無過者不論人等即成仙佛有閉藏毁謗見不奉行者殃及一身禍流後代愼之愼之以上三條係呂帝親示讀者務觸目警心依教奉行勿徒作文字看過有辜聖訓五經合編後跋聿豫皈依至道垂三十年每思勉行一切善事流通一切善典以為持躬治心之本懴除往愆之助於仙佛結良因於人世作法施綦要務也我孚佑上帝慈悲無量普度羣迷凡全書所載一切經訓廣大精微久已布行海內而浙本楚本間多舛訛豫思共釐正惜尚無緣茲偕同人重訂全書正宗集成快讀數過如握奇珍顧每卷多有序跋而茲五經合編共囑豫附筆簡末是册也心為始功用以度人證聖至得金玉還丹總不外醒心一大法門為要歸焉旨哉言乎此與儒宗精一執中之心傳大士摩訶般若之心經同一心法也豫弟阿照曩曾刻醒心經單行之以為修心者勸夫醒者覺也此合編也始終一醒心法始終一覺世法也是宜昭然與覺世經陰隲文並垂萬古者也豫爰於是册敬跋數語以志初願之成並以報吾之同心而修心者弟子大器熏沐敬跋
