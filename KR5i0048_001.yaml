front:
  text: 五經合編五經合編序大士之降法壇灑甘露以灌溉靈心慈悲之度人無量我純陽仙師之慈濟婆心亦與大士相侔其飛鸞宣化到處説法如恆河沙之難量而世所傳集全書雖不能盡高深之萬一亦可以仰窺一斑集中如此壇重訂之五經合編最足以發也何也仙師度人心切必本妙經經之為言徑也人所共由人所必由之徑非得仙師度之得其途者或寡矣仙師如何度之度以其心耳是以此編本度人妙經度得人斯證得聖聖何以證唯藉此妙經此經之所以為金玉耳而有是經必先自按其心其以吾仙師之心經為首諦有是心而昏冥不靈必得仙師之經以醒之此醒心經所以為此編之殿歟能讀是經信受奉行由漸厯久實為體驗斯為能自全其心而於以全其人因以證夫聖不難也則斯編為全書中要典昭然矣覩斯編者知夫經之妙即能知仙師用心之普度無邊真與大士之心無兩也爰記此為壇中諸法子一證以共襄斯典云三山笛史韓湘書五經合編題詞三教一心法也一大藏教心學也茲五經合編以心為綜故首曰心經度人度此心也證聖證此心也金玉還丹鍊此心也醒心者全此心也編五合一亦義符中土之數總此心也心乎心乎大周沙界之外而細入無間之中故著此經者以是心讀此經者亦以是心儒曰求其放心此心此經之謂也佛曰制之一處此心此經之謂也得此心然後可以入吾道得此心然後可以讀是經經即心也心即經也然則無事乎多言説也故豫作原起僅題數語如是宏教弟子柳守元熏沐題詞重刋道藏輯要
